<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube RAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f11;
      --surface:     #1a1a1f;
      --surface2:    #242429;
      --border:      #2e2e36;
      --accent:      #ff4444;
      --accent-soft: rgba(255, 68, 68, 0.12);
      --accent-glow: rgba(255, 68, 68, 0.25);
      --text:        #f0f0f5;
      --text-dim:    #888896;
      --text-muted:  #4a4a58;
      --green:       #22c55e;
      --yellow:      #eab308;
      --user-bg:     #1e2a3a;
      --user-border: #2a3f56;
      --radius:      10px;
      --radius-sm:   6px;
    }

    body {
      width: 380px;
      min-height: 520px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .logo svg { width: 16px; height: 16px; fill: white; }

    .header-text { flex: 1; }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .header-sub {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
      font-family: 'DM Mono', monospace;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.detecting  { background: var(--text-muted); }
    .status-dot.checking   { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.indexing   { background: var(--yellow); animation: pulse 0.6s infinite; }
    .status-dot.ready      { background: var(--green); }
    .status-dot.not-indexed{ background: var(--accent); }
    .status-dot.error      { background: var(--accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    #status-text {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    /* ── Main Content ────────────────────────────────────────────── */
    #main-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* ── Video Info Strip ────────────────────────────────────────── */
    .video-strip {
      padding: 8px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .video-label {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #video-id {
      font-size: 11px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }

    /* ── Index Button ────────────────────────────────────────────── */
    #index-btn {
      display: none;
      margin: 16px;
      padding: 11px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px var(--accent-glow);
      letter-spacing: 0.01em;
    }

    #index-btn:hover:not(:disabled) {
      background: #ff5555;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    #index-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Chat Section ────────────────────────────────────────────── */
    #chat-section {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* ── Messages ────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message { display: flex; flex-direction: column; }

    .message.user   { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: 88%;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 12.5px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: #c8ddf5;
      border-bottom-right-radius: 3px;
    }

    .message.assistant .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .message.thinking .bubble {
      color: var(--text-dim);
      font-style: italic;
    }

    /* Thinking dots animation */
    .message.thinking .bubble::after {
      content: '';
      display: inline-block;
      width: 12px;
      animation: dots 1.2s infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* ── Input Area ──────────────────────────────────────────────── */
    .input-area {
      padding: 10px 12px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--surface);
      flex-shrink: 0;
    }

    #question-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      padding: 9px 11px;
      resize: none;
      outline: none;
      min-height: 36px;
      max-height: 80px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    #question-input::placeholder { color: var(--text-muted); }

    #question-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    #send-btn:hover:not(:disabled) {
      background: #ff5555;
      transform: translateY(-1px);
    }

    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #send-btn svg { width: 15px; height: 15px; fill: white; }

    /* ── Not YouTube screen ──────────────────────────────────────── */
    #not-youtube {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px;
      text-align: center;
    }

    .not-youtube-icon {
      width: 48px;
      height: 48px;
      background: var(--surface2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .not-youtube-icon svg { width: 24px; height: 24px; opacity: 0.4; }

    #not-youtube h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    #not-youtube p {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      max-width: 240px;
    }

    /* ── Suggested questions ─────────────────────────────────────── */
    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 14px 10px;
      flex-shrink: 0;
    }

    .suggestion-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'DM Mono', monospace;
      margin-bottom: 2px;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      padding: 4px 9px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-soft);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <!-- Play icon -->
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div class="header-text">
      <div class="header-title">YouTube RAG</div>
      <div class="header-sub">localhost:8000</div>
    </div>
    <div class="status-row">
      <div class="status-dot detecting" id="status-badge"></div>
      <span id="status-text">Starting...</span>
    </div>
  </div>

  <!-- Main content (shown on YouTube) -->
  <div id="main-content">

    <!-- Video ID strip -->
    <div class="video-strip">
      <span class="video-label">Video</span>
      <span id="video-id">—</span>
    </div>

    <!-- Index Button -->
    <button id="index-btn">
      ⚡ Index This Video
    </button>

    <!-- Chat Section -->
    <div id="chat-section">

      <!-- Suggested questions -->
      <div class="suggestions" id="suggestions">
        <div class="suggestion-label">Try asking</div>
        <div class="suggestion-chips">
          <span class="chip" data-q="Summarize this video">Summarize</span>
          <span class="chip" data-q="What are the main topics?">Main topics</span>
          <span class="chip" data-q="What are the key takeaways?">Key takeaways</span>
          <span class="chip" data-q="List the important points">List points</span>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages"></div>

      <!-- Input -->
      <div class="input-area">
        <textarea
          id="question-input"
          placeholder="Ask about this video..."
          rows="1"
        ></textarea>
        <button id="send-btn" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Not on YouTube screen -->
  <div id="not-youtube">
    <div class="not-youtube-icon">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.861-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12 S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z"/></svg>
    </div>
    <h3>Open a YouTube Video</h3>
    <p>Navigate to a YouTube video and click this extension to start chatting with it.</p>
  </div>

  <script src="popup.js"></script>
  <script>
    // Suggestion chips click handler
    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const q = chip.getAttribute("data-q");
        document.getElementById("question-input").value = q;
        document.getElementById("question-input").focus();
      });
    });

    // Auto-resize textarea
    const textarea = document.getElementById("question-input");
    textarea.addEventListener("input", () => {
      textarea.style.height = "auto";
      textarea.style.height = Math.min(textarea.scrollHeight, 80) + "px";
    });

    // Hide suggestions after first message
    const origAddMessage = window.addMessage;
    document.getElementById("send-btn").addEventListener("click", () => {
      document.getElementById("suggestions").style.display = "none";
    }, { once: true });
  </script>
</body>
</html>
